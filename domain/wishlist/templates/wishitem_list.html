{{ define "wishlist/wishitem/list"}}
<!doctype>
<html>

<head>
    <title>Wish Item form</title>

    {{ template "meta_tags" }}
    {{ template "base_styles" }}
</head>

<body>
    <ul>
        {{ range .List }}
        <li>
            <span>
                {{.Id}} - {{.Name}}
            </span>
            <a href="{{.Id}}">Edit</a>
            <button type="button" data-action="delete">Delete</a>
        </li>
        {{ end }}
    </ul>
</body>

</html>
{{end}}
