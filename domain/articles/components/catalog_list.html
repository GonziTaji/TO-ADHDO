{{define "catalog-list"}}
<ul class="articles-list">
    {{ range .}}
    <li class="article-row">
        <a href="/articles/{{.Id}}" class="article-image-wrapper">
            <img src="{{.ThumbnailUrl}}" alt="{{.Name}}'s image" />
        </a>

        <div class="article-info">
            <div class="informative-badges">
                <span class="trade-badge" data-tradeable="{{.AvailableForTrade}}">
                    Permuta
                </span>

                <span class="condition-badge" data-condition="{{.Condition.Slug}}">
                    {{.Condition.Label}}
                </span>
            </div>

            <h3 class="article-name">
                <a href="/articles/{{.Id}}" class="article-name">{{ .Name }}</a>
            </h3>

            <ul class="article-tags-list">
                {{range .Tags}}
                <li class="article-tag">
                    {{.Name}}
                </li>
                {{end}}
            </ul>

            <div>
                <span class="article-price">{{ format_clp .Price }}</span>
                <br />
                <span>
                    <small>
                        Ref. price:
                        {{ if eq .ReferencePrice 0 }}-
                        {{else}}{{ format_clp .ReferencePrice }}
                        {{end}}
                    </small>
                </span>
            </div>
        </div>
    </li>
    {{end}}
</ul>
{{end}}
