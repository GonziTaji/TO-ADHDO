{{ define "articles/catalog" }}
<!doctype>
<html>

<head>
    <title>Catalog</title>

    {{ template "meta_tags" }}
    {{ template "base_styles" }}
</head>

<body>
    <div id="articles-catalog">
        <h1>Catalog</h1>

        <form>
            <fieldset>
                <legend>Filters</legend>
            </fieldset>
        </form>

        <ul class="articles-list">
            {{ range .}}
            <li class="article-row">
                <a href="/articles/{{.Id}}" class="article-image-wrapper">
                    <img src="{{.ThumbnailUrl}}" alt="{{.Name}}'s image" />
                </a>

                <div class="article-info">
                    <h3>
                        <a href="/articles/{{.Id}}" class="article-name">{{ .Name }}</a>
                    </h3>

                    <ul class="article-tags-list">
                        {{range .Tags}}
                        <li class="article-tag">
                            {{.Name}}
                        </li>
                        {{end}}
                    </ul>

                    <div class="article-price">
                        <span>{{ format_clp .Price }}</span>
                    </div>
                </div>
            </li>
            {{end}}
        </ul>
    </div>

    <style>
        #articles-catalog {
            h1 {
                font-size: var(--font-size-xl);
            }

            .articles-list {
                --column-count: 1;

                display: grid;
                grid-template-columns: repeat(var(--column-count), 1fr);
                gap: 1rem;
                background: #d0d0d0;
                padding: 1rem;

                @media(min-width: 425px) {
                    --column-count: 2;
                }

                @media(min-width: 768px) {
                    --column-count: 3;
                }

                @media(min-width: 1024px) {
                    --column-count: 4;
                }

                .article-row {
                    border-radius: 12px;
                    background: white;
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    column-gap: var(--space-5);
                    padding: var(--space-4) var(--space-5);

                    .article-name {
                        font-weight: 700;
                        color: hsl(0 0 30%);
                    }

                    .article-info {
                        flex-grow: 1;
                        gap: var(--space-3);
                        padding-block: var(--space-3);
                        align-self: stretch;
                        display: flex;
                        flex-direction: column;
                        justify-content: space-between;
                    }

                    .article-price {
                        font-size: var(--fontsize-lg);
                        flex-grow: 1;
                        align-content: end;
                    }

                    .article-image-wrapper {
                        border: 1px solid oklch(80% 0 0);
                        overflow: hidden;
                        width: 100%;
                        height: 144px;

                        img {
                            width: 100%;
                            height: 100%;
                            object-fit: cover;
                        }

                    }

                    .article-tags-list {
                        display: flex;
                        gap: var(--space-3);

                        .article-tag {
                            font-size: var(--fontsize-sm);
                            padding: var(--space-1) var(--space-3);
                            border-radius: 4px;
                            background-color: var(--color-tertiary);
                        }
                    }
                }
            }
        }
    </style>

    <script></script>
</body>

</html>
{{ end }}
