{{ define "tags/list" }}
<!doctype>

<html>

<head>
    <title>Tags</title>
    {{ template "meta_tags" }}
</head>

<body>
    <div id="tags_list">
        <h1>Tags list</h1>

        <input type="text" name="search" id="search_input" placeholder="Search" />

        <ul>
            {{ range . }}
            <li data-record-id="{{.Id}}">
                <span>[ in {{.Usage}} articles <a href="/articles?tagid={{.Id}}" target="_parent">view</a>]</span>

                <span>{{.Name}}</span>

                <button type="button" data-action="delete-tag" data-tagid="{{.Id}}">&times;</button>
            </li>
            {{ end }}
        </ul>
    </div>

    <style id="base_styles">
        body {
            margin: 0;
        }

        h1 {
            margin: 0;
        }

        ul {
            margin: 0;
            padding: 0;
        }

        a {
            text-decoration: none;
        }

        button {
            cursor: pointer;
        }
    </style>

    <style id="tags_list_styles">
        #tags_list {
            margin: 40px auto 0 auto;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 16px;

            ul {
                border: 2px solid #cccccc66;
                border-radius: 4px;

                margin: 0;
                padding: 0;
                display: grid;
                grid-template-columns: auto 1fr auto;

                li {
                    padding: 8px 16px;

                    display: grid;
                    grid-column: 1/4;
                    grid-template-columns: subgrid;
                    justify-content: start;
                    column-gap: 8px;

                    &:nth-child(2n) {
                        background-color: #eee;
                    }

                    &:hover {
                        background-color: #ddd;
                    }

                    button {
                        cursor: pointer;
                    }

                    a {
                        text-decoration: none;
                    }
                }
            }
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", mount)

        function mount() {
            document.addEventListener("click", delegateClick)
        }

        function delegateClick(ev) {
            const btn = ev.target.closest('[data-action]')

            if (!btn) {
                return
            }

            const {action, tagid} = btn.dataset

            switch (action) {
                case 'delete-tag':
                    alert(`delete tag clicked for tag ${tagid}!!`)
                    break;
            }
        }
    </script>
</body>

</html>

{{ end }}
