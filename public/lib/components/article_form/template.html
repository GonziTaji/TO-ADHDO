{{ define "components/article_form" }}

<form id="article_form" data-record-id="{{.Id}}">
    <h2>Create article</h2>

    <input name="id" type="hidden" value="{{.Id}}" />

    <div class="form_control">
        <label for="article_form__input_name">Name:</label>
        <input id="article_form__input_name" type="text" name="name" value="" />
    </div>

    <div class="form_control">
        <label for="article_form__input_description">Description:</label>
        <textarea name="description" id="article_form__input_description" type="text" name="description" rows="3"
            value=""></textarea>
    </div>

    <div class="form_control">
        <label for="article_form__input_search_tag">Tags:</label>

        <li class="article_form__selected_tags_list"></li>

        <input name="tag_search_term" id="article_form__input_search_tag" type="text" list="datalist__available_tags" />

        <ul class="article_form__suggested_tags_list"></ul>
    </div>

    <!--
        @review: how can we identify the datalist of this form vs the datalist of another form that could be in the DOM?
            - I think only one of these should be ever in any page
    -->
    <datalist id="datalist__available_tags">
        {{ range .tags }}
        <option value="{{.Name}}"></option>
        {{ end }}
    </datalist>

    <button class="article_form__btn_submit" type="submit">Save</button>

    <template class="article_form__selected_tag_template">
        <div class="article_form__selected_tag">
            <input type="text" name="tags" readonly />
            <button class="article_form__btn_remove_tag" type="button">
                &times;
            </button>
        </div>
    </template>

    <script type="module">

        import controller from "./public/lib/components/article_form/controller.js"

        document.addEventListener('DOMContentLoaded', () => {
            const selector = '#article_form'
            const form = document.querySelector(selector)

            if (!form) {
                const msg = `No element to be attached to the controller found. Selector: ${selector}`
                console.error(new Error(msg))
                pf


                try {
                    controller.init(form)
                } catch (e) {
                    console.error(e)
                }
            })
    </script>
</form>
{{end}}
