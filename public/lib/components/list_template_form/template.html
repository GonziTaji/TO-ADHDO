{{ define "components/list_template_form" }}

<form data-list-template-id={{.Id}}>
    <label for="list_template_form__name_input">Name:</label>
    <input type="text" name="name" id="list_template_form__name_input" />

    <label for="list_template_form__task_name_input">Task name:</label>
    <input type="text" name="task_name" id="list_template_form__task_name_input" />

    <ul id="list_template_form__recomended_tasks"></ul>

    <ul class="task_templates_selected">
        {{range .Tasks}}
        {{ template "components/list_template_selected_task" .Task }}
        {{ end }}
    </ul>

    {{ template components/list_template_script }}
</form>


{{ end }}

<template id="list_template_form__selected_task_template">
    {{ define "components/list_template_selected_task" }}
    <li>
        <span>{{.Name}}</span>
        <p>{{.Description}}</p>
        <ul>
            {{range .Tags}}
            <li>{{.Name}}</li>
            {{end}}
        </ul>
    </li>
    {{end}}
</template>

<template id="list_template_form__recomended_task_template">
    <li>
        <span>{{.Name}}</span>
        <p>{{.Description}}</p>
        <ul>
            {{range .Tags}}
            <li>{{.Name}}</li>
            {{end}}
        </ul>
    </li>
</template>

{{ define "components/list_template_script" }}
