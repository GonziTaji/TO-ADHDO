{{ define "home_page" }}
<!doctype html>

<html>

<head>
    <title>to-adhdo - Task {{ .task.Name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link href="public/styles/main.css" rel="stylesheet" />
</head>

<div class="task_template__container">
    <div class="task_template__content_container" data-task-id="{{.task.Id}}">
        {{ template "task_template_view" (dict "task" .task) }}
    </div>

    <!-- data-mode type 'normal' | 'edit' to identify mode in css -->
    <div class="task_template__buttons_container" data-mode="normal">
        <div data-mode-target="normal">
            <button data-btn-action="edit" type="button">Edit</button>
            <button data-btn-action="delete" type="button">Remove</button>
        </div>

        <div data-mode-target="edit">
            <button data-btn-action="save" type="button">Save</button>
            <button data-btn-action="cancel" type="button">Cancel</button>
        </div>
    </div>

    <script type="module">
        import controller from "./controller.js"

        controller.mount(
            "{{.task.Id}}",
            document.querySelector(".task_template__content_container"),
            document.querySelector(".task_template__buttons_container")
        )
    </script>

    <style>
        [data-mode="normal"] [data-mode-target="normal"],
        [data-mode="edit"] [data-mode-target="edit"] {
            display: block;
        }

        [data-mode="normal"] [data-mode-target="edit"],
        [data-mode="edit"] [data-mode-target="normal"] {
            display: none;
        }
    </style>
</div>

{{ end }}
